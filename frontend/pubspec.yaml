publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shorebird_code_push: ^1.1.0
  cupertino_icons: ^1.0.2
  flutter_bloc: ^8.1.3
  google_maps_flutter: ^2.5.0
  latlong2: ^0.9.0
  http: ^1.1.0
  provider: ^6.0.5
  mapbox_maps_flutter: ^0.4.0
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
